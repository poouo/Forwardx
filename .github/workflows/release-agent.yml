name: Release Agent

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-agent-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-agent:
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check version split
        run: npm run check:versions

      - name: Build Linux Agent binaries
        run: bash scripts/build-agent-release.sh

      - name: Upload Agent binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: |
            dist/agent/forwardx-agent-linux-amd64
            dist/agent/forwardx-agent-linux-arm64
            dist/agent/forwardx-fxp-linux-amd64
            dist/agent/forwardx-fxp-linux-arm64
            dist/agent/forwardx-runtime-linux-amd64
            dist/agent/forwardx-runtime-linux-arm64
            dist/agent/SHA256SUMS
          fail_on_unmatched_files: true
