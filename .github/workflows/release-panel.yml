name: Release Panel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-panel-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install udp2raw build toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends g++ aarch64-linux-gnu-g++

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version split
        run: pnpm check:versions

      - name: Prepare release notes
        shell: bash
        run: node scripts/extract-release-notes.mjs "${{ steps.release.outputs.version_no_v }}" > RELEASE_NOTES.md

      - name: Build panel assets
        run: pnpm build

      - name: Build bundled Agent assets
        run: bash scripts/build-agent-release.sh

      - name: Package panel runtime bundle
        shell: bash
        env:
          VERSION_NO_V: ${{ steps.release.outputs.version_no_v }}
        run: |
          mkdir -p .release dist/panel
          BUNDLE="forwardx-panel-v${VERSION_NO_V}.tar.gz"
          tar -czf ".release/${BUNDLE}" \
            dist \
            client/dist \
            drizzle \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            scripts/install-panel-local.sh \
            scripts/install-panel-docker.sh
          cp ".release/${BUNDLE}" "dist/panel/${BUNDLE}"
          ls -lh "dist/panel/${BUNDLE}"

      - name: Upload panel bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: forwardx-panel-bundle
          path: dist/panel/*.tar.gz

      - name: Upload panel bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/panel/*.tar.gz
          fail_on_unmatched_files: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push panel image
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/forwardx"
          TAG_ARGS=(-t "${IMAGE}:${VERSION}")
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_ARGS+=(-t "${IMAGE}:latest")
          fi
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            "${TAG_ARGS[@]}" \
            .
