name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build VitePress docs
        env:
          VITEPRESS_BASE: ${{ vars.VITEPRESS_BASE || format('/{0}/', github.event.repository.name) }}
        run: pnpm docs:build

      - name: Validate Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="docs/.vitepress/dist"
          if [ ! -d "$artifact_dir" ]; then
            echo "::error::Pages artifact directory does not exist: $artifact_dir"
            exit 1
          fi
          if [ ! -f "$artifact_dir/index.html" ]; then
            echo "::error::Pages artifact is missing index.html: $artifact_dir/index.html"
            exit 1
          fi
          file_count="$(find "$artifact_dir" -type f | wc -l | tr -d '[:space:]')"
          total_bytes="$(du -sb "$artifact_dir" | awk '{print $1}')"
          echo "Pages artifact directory: $artifact_dir"
          echo "Pages artifact files: $file_count"
          echo "Pages artifact bytes: $total_bytes"
          if [ "$file_count" -le 0 ]; then
            echo "::error::Pages artifact is empty: $artifact_dir"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000

